services:
  postgres:
    image: postgres:16-alpine
    container_name: replift-postgres
    environment:
      POSTGRES_USER: replift
      POSTGRES_PASSWORD: replift_dev
      POSTGRES_DB: replift
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U replift"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: replift-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
