name: Deploy demo to GitHub Pages

# The live demo is the frontend in mock mode: the complete in-browser backend
# simulation (offline sync, idempotency, conflicts, search) with zero infra.
# The full stack runs locally via `docker compose up` — see README.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx next build
        working-directory: frontend
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_STATIC_EXPORT: "1"
      - run: touch frontend/out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
