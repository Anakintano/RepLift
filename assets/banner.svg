<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RepLift — Eat with intent. Lift your limits.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1120"/>
      <stop offset="0.62" stop-color="#111827"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#F97316" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#F97316" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" rx="24" fill="url(#bg)"/>
  <rect width="1280" height="320" rx="24" fill="url(#glow)"/>

  <!-- ring gauge motif (right) -->
  <g transform="translate(1020 160)">
    <circle r="96" stroke="#F8FAFC" stroke-opacity="0.08" stroke-width="18" fill="none"/>
    <circle r="96" stroke="url(#flame)" stroke-width="18" fill="none" stroke-linecap="round"
            stroke-dasharray="603" stroke-dashoffset="211" transform="rotate(-90)"/>
    <text y="-2" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="800" fill="#F8FAFC">742</text>
    <text y="30" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#94A3B8">kcal left</text>
  </g>

  <!-- macro bars motif -->
  <g transform="translate(760 96)" opacity="0.9">
    <rect width="150" height="8" rx="4" fill="#F8FAFC" fill-opacity="0.1"/><rect width="96" height="8" rx="4" fill="#60A5FA"/>
    <rect y="26" width="150" height="8" rx="4" fill="#F8FAFC" fill-opacity="0.1"/><rect y="26" width="101" height="8" rx="4" fill="#FBBF24"/>
    <rect y="52" width="150" height="8" rx="4" fill="#F8FAFC" fill-opacity="0.1"/><rect y="52" width="93" height="8" rx="4" fill="#A78BFA"/>
  </g>
  <!-- offline chip -->
  <g transform="translate(760 190)">
    <rect width="196" height="40" rx="20" fill="#F8FAFC" fill-opacity="0.07" stroke="#F8FAFC" stroke-opacity="0.14"/>
    <circle cx="24" cy="20" r="5" fill="#FBBF24"/>
    <text x="42" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#CBD5E1">Offline — 3 queued</text>
  </g>

  <!-- wordmark + tagline -->
  <g transform="translate(72 92)">
    <rect width="64" height="64" rx="18" fill="url(#flame)"/>
    <path d="M20 44 L20 20 L34 20 C40 20 44 24 44 29.5 C44 34 41 37 37 38 L45 44 L37 44 L30 38.5 L27 38.5 L27 44 Z M27 26 L27 33 L33 33 C35.5 33 37 31.6 37 29.5 C37 27.4 35.5 26 33 26 Z" fill="#FFFFFF"/>
    <text x="84" y="47" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="800" fill="#F8FAFC">Rep<tspan fill="#FB923C">Lift</tspan></text>
  </g>
  <text x="74" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#F8FAFC">Eat with intent. <tspan fill="#FB923C">Lift your limits.</tspan></text>
  <text x="74" y="244" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#94A3B8">Offline-first logging · explainable food search · nutrition math you can trust</text>

  <!-- stack chips -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#CBD5E1">
    <g transform="translate(74 268)">
      <rect width="76" height="28" rx="14" fill="#F8FAFC" fill-opacity="0.06" stroke="#F8FAFC" stroke-opacity="0.12"/>
      <text x="38" y="19" text-anchor="middle">Next.js</text>
    </g>
    <g transform="translate(158 268)">
      <rect width="80" height="28" rx="14" fill="#F8FAFC" fill-opacity="0.06" stroke="#F8FAFC" stroke-opacity="0.12"/>
      <text x="40" y="19" text-anchor="middle">FastAPI</text>
    </g>
    <g transform="translate(246 268)">
      <rect width="100" height="28" rx="14" fill="#F8FAFC" fill-opacity="0.06" stroke="#F8FAFC" stroke-opacity="0.12"/>
      <text x="50" y="19" text-anchor="middle">PostgreSQL</text>
    </g>
    <g transform="translate(354 268)">
      <rect width="64" height="28" rx="14" fill="#F8FAFC" fill-opacity="0.06" stroke="#F8FAFC" stroke-opacity="0.12"/>
      <text x="32" y="19" text-anchor="middle">Redis</text>
    </g>
  </g>
</svg>
